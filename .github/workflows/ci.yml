name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    runs-on: ubuntu-latest
    env:
      JAVA_OPTS: "-Xmx6G -XX:+UseG1GC"
      SBT_OPTS: "-Dsbt.ci=true"
    steps:

      - name: Checkout current branch
        uses: actions/checkout@v6

      - name: Setup JVM
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Test
        run: sbt test

  compile:
    runs-on: ubuntu-latest
    env:
      JAVA_OPTS: "-Xmx6G -XX:+UseG1GC"
      SBT_OPTS: "-Dsbt.ci=true"
    steps:

      - name: Checkout current branch
        uses: actions/checkout@v6

      - name: Setup JVM
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: compile
        run: sbt compile

  format:
    runs-on: ubuntu-latest
    env:
      JAVA_OPTS: "-Xmx6G -XX:+UseG1GC"
      SBT_OPTS: "-Dsbt.ci=true"
    steps:

      - name: Checkout current branch
        uses: actions/checkout@v6

      - name: Setup JVM
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: format
        run: sbt scalafmtCheckAll

  scripted-tests:
    runs-on: ubuntu-latest
    env:
      JAVA_OPTS: "-Xmx6G -XX:+UseG1GC"
      SBT_OPTS: "-Dsbt.ci=true"
    steps:

      - name: Checkout current branch
        uses: actions/checkout@v6

      - name: Setup JVM
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Scripted Test
        run: |
          sbt \
            Play-Exceptions/publishLocal \
            Sbt-Routes-Compiler/publishLocal \
            Sbt-Plugin/publishLocal \
            Sbt-Scripted-Tools/publishLocal \
            "Sbt-Plugin/scripted play-sbt-plugin/show-versions"
